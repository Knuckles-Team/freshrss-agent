[bumpversion]
current_version = 0.1.0
commit = True
tag = True

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file(all-extra):pyproject.toml]
search = freshrss-agent[mcp,agent,logfire]>={current_version}
replace = freshrss-agent[mcp,agent,logfire]>={new_version}

[bumpversion:file:a2a.json]
search = "version": "{current_version}"
replace = "version": "{new_version}"

[bumpversion:file:README.md]
search = Version: {current_version}
replace = Version: {new_version}

[bumpversion:file:docker/Dockerfile]
search = freshrss-agent[all]>={current_version}
replace = freshrss-agent[all]>={new_version}

[bumpversion:file:freshrss_agent/agent_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:freshrss_agent/mcp_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"
